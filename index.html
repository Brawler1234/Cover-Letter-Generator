<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cover Letter Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Cover Letter Generator</h1>
    <p class="subtitle">Fill in the details below and Claude will draft a personalized cover letter.</p>

    <form id="letter-form">
      <label for="job-posting">Job posting text</label>
      <textarea id="job-posting" rows="8" placeholder="Paste the full job posting here" required></textarea>

      <label for="background">Your background</label>
      <textarea id="background" rows="8" placeholder="Summarize your relevant experience, skills, and history" required></textarea>

      <label for="motivation">Why this role/company interests you</label>
      <textarea id="motivation" rows="4" placeholder="What draws you to this role or company specifically?" required></textarea>

      <label for="story">A specific story or achievement to include</label>
      <textarea id="story" rows="4" placeholder="A concrete example, project, or moment worth mentioning" required></textarea>

      <label for="avoid">Things to avoid mentioning <span class="optional">(optional)</span></label>
      <input type="text" id="avoid" placeholder="e.g. a previous employer, a gap in employment" />

      <button type="submit" id="submit-btn">Generate Cover Letter</button>
    </form>

    <p id="status" class="status" hidden></p>

    <section id="result-section" hidden>
      <label for="result">Generated cover letter <span class="optional">(editable)</span></label>
      <textarea id="result" rows="16"></textarea>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
